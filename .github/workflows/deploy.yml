name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run deploy:sync

      - name: Commit production build to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets 404.html CNAME minilogo.jpg photopro.jpg robots.txt sitemap.xml
          git add a-propos automatisations developpement devis faq formations ia infrastructure mentions-legales offres outils politique-confidentialite realisations services services-info 2>/dev/null || true
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "chore: deploy production build to GitHub Pages"
          git push
